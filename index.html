<style>
  :root{
    --bg:#0a0e11; --panel:#121a20; --panel2:#18232b; --line:#26333d;
    --ink:#e9eef1; --muted:#8598a4; --dim:#5d6e79;
    --go:#37d98a; --amber:#ffb224; --warn:#ff5d5d; --sky:#4aa8ff;
    --shadow:0 1px 0 rgba(255,255,255,.03), 0 10px 30px rgba(0,0,0,.5);
    --disp:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:
     radial-gradient(1200px 600px at 80% -10%, #12212b 0%, transparent 60%),
     var(--bg);
     color:var(--ink);font-family:var(--disp);-webkit-text-size-adjust:100%;font-size:17px;}
  body{min-height:100vh;display:flex;justify-content:center;
    padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right))
            max(16px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left))}
  .wrap{width:100%;max-width:760px}
  .mono{font-family:var(--mono)}
  .cond,h1,h2,.btn,.msg,.stat b,.tab{font-family:var(--disp)}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
    padding:14px 4px 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
  h1{margin:0;font-weight:600;letter-spacing:.05em;font-size:22px;text-transform:uppercase;line-height:1.05}
  h1 span{color:var(--dim);display:block;font-size:11px;letter-spacing:.22em;font-weight:400;margin-top:4px}
  .instr{display:flex;gap:14px;text-align:right}
  .stat{min-width:52px}
  .stat b{display:block;font-size:26px;line-height:1;color:var(--go)}
  .stat.streak b{color:var(--amber)} .stat.of b{color:var(--sky)}
  .stat s{display:block;font-size:10px;letter-spacing:.18em;color:var(--dim);text-decoration:none;margin-top:5px;text-transform:uppercase}

  .tabs{display:flex;gap:6px;margin-bottom:12px}
  .tab{flex:1;text-align:center;padding:13px 4px;border:1px solid var(--line);border-radius:10px;
    background:var(--panel2);color:var(--muted);font-size:13px;letter-spacing:.06em;
    text-transform:uppercase;cursor:pointer;transition:.12s;user-select:none}
  .tab:hover{border-color:var(--muted)}
  .tab.on{background:var(--sky);color:#04121f;border-color:var(--sky);font-weight:600}
  .tab.full.on{background:var(--amber);border-color:var(--amber)}
  .tab.c5.on{background:var(--go);border-color:var(--go);color:#052015}
  .tab.ho.on{background:#b48cff;border-color:#b48cff;color:#140a24}

  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
  .catdd{position:relative}
  .catbtn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:9px;
    padding:11px 14px;font-size:14px;letter-spacing:.05em;cursor:pointer;font-family:var(--disp);
    display:inline-flex;align-items:center;gap:8px;transition:.12s;text-transform:uppercase}
  .catbtn:hover{border-color:var(--muted)}
  .catbtn .car{color:var(--dim);font-size:10px}
  .catmenu{position:absolute;top:calc(100% + 6px);left:0;z-index:40;min-width:min(300px,86vw);max-height:60vh;overflow:auto;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px;display:none;
    box-shadow:0 14px 34px rgba(0,0,0,.55)}
  .catmenu.open{display:block}
  .catrow{display:flex;align-items:center;gap:11px;padding:13px 11px;border-radius:8px;cursor:pointer;
    font-size:14px;letter-spacing:.05em;color:var(--ink);text-transform:uppercase;user-select:none}
  .catrow:hover{background:#0c1318}
  .catrow input{accent-color:var(--go);width:20px;height:20px;pointer-events:none;flex:0 0 auto}
  .catrow .cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--dim)}
  .catrow.allrow{border-bottom:1px solid var(--line);border-radius:7px 7px 0 0;margin-bottom:4px}
  .chk{display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.06em;color:var(--muted);cursor:pointer;user-select:none;text-transform:uppercase}
  .chk input{accent-color:var(--go);width:19px;height:19px}

  .card{background:linear-gradient(180deg,var(--panel) 0%,#0f171d 100%);border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .ref{font-size:12px;color:var(--dim);letter-spacing:.12em;margin:2px 0 14px}

  .body{padding:20px 16px 22px}
  .msg{font-size:29px;font-weight:600;letter-spacing:.01em;line-height:1.12;text-transform:uppercase;margin:4px 0 4px}
  .sub{color:var(--muted);font-size:15px;line-height:1.45;margin:0 0 18px}
  .prompt{color:var(--dim);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}

  .rows{display:flex;flex-direction:column;gap:9px}
  .cond{font-size:11px;letter-spacing:.05em;color:var(--amber);text-transform:uppercase;margin:8px 2px 1px;opacity:.9}
  .row{display:flex;align-items:stretch;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#0c1318;transition:border-color .15s}
  .row .n{flex:0 0 42px;display:flex;align-items:center;justify-content:center;background:var(--panel2);color:var(--dim);font-size:13px;border-right:1px solid var(--line)}
  .row input{flex:1;background:transparent;border:0;color:var(--ink);padding:15px 13px;font-size:16px;letter-spacing:.02em;outline:none;font-family:var(--mono)}
  .row input::placeholder{color:#3f4d57}
  .row .mk{flex:0 0 42px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--dim)}
  .row.ok{border-color:var(--go)} .row.ok .n{color:var(--go)} .row.ok .mk{color:var(--go)}
  .row.bad{border-color:var(--warn)} .row.bad .mk{color:var(--warn)}
  .ans{padding:3px 12px 0 55px;font-size:13px;color:var(--go);letter-spacing:.02em;min-height:0;font-family:var(--mono)}
  .ans:empty{display:none}
  .row .lbl{flex:1 1 48%;display:flex;align-items:center;gap:8px;background:var(--panel2);
    border-right:1px solid var(--line);padding:10px 11px;font-size:13px;color:var(--muted);
    letter-spacing:.03em;text-transform:uppercase;line-height:1.25}
  .row .lbl .unit{color:var(--sky);font-family:var(--mono);font-size:11px;white-space:nowrap}
  .row input.num{flex:1 1 52%;min-width:90px;text-align:right}

  /* flashcards */
  .fc{border:1px dashed var(--line);border-radius:12px;min-height:190px;display:flex;align-items:center;justify-content:center;
      padding:20px;cursor:pointer;background:#0c1318;text-align:center;transition:border-color .15s}
  .fc:hover{border-color:var(--muted)}
  .fc .hint{color:var(--dim);letter-spacing:.14em;text-transform:uppercase;font-size:13px}
  .fc.flipped{cursor:default;border-style:solid;border-color:var(--sky);display:block;text-align:left}
  .fs{display:flex;gap:11px;padding:6px 0;font-size:16px;line-height:1.5}
  .fs .fn{flex:0 0 22px;color:var(--sky);font-family:var(--mono);font-size:13px}
  .fcond{color:var(--amber);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 0}

  /* multiple choice */
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{border:1px solid var(--line);border-radius:11px;padding:14px 14px;background:#0c1318;cursor:pointer;display:flex;gap:11px;transition:.12s}
  .opt:hover{border-color:var(--muted)}
  .opt .l{flex:0 0 24px;color:var(--sky);font-weight:700;font-family:var(--mono);font-size:16px}
  .opt .steps{font-size:15px;line-height:1.5;color:var(--ink)}
  .opt .steps div{padding:1px 0}
  .opt.correct{border-color:var(--go);background:rgba(55,217,138,.07)} .opt.correct .l{color:var(--go)}
  .opt.wrong{border-color:var(--warn);background:rgba(255,93,93,.07)} .opt.wrong .l{color:var(--warn)}
  .opt.dim{opacity:.4}
  .opt.locked{cursor:default}

  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .btn{flex:1 1 auto;min-width:104px;text-align:center;padding:15px 16px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:14px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--muted)}
  .btn.primary{background:var(--go);color:#052015;border-color:var(--go);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.danger{border-color:rgba(255,93,93,.5)}
  .btn.ghost{background:transparent}
  .btn.primary.ghost{background:var(--go)}
  .btn:disabled{opacity:.35;cursor:not-allowed}

  .grade{display:none;gap:8px;margin-top:12px;align-items:center;flex-wrap:wrap}
  .grade.show{display:flex}

/* ---------- Matching (Recall mode) ---------- */
function norm(s){return ' '+String(s).toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim()+' ';}
function hasTok(n,t){t=t.toLowerCase().trim();return t.indexOf(' ')>=0 ? n.indexOf(t)>=0 : n.indexOf(' '+t+' ')>=0;}
function stepOK(input,keys){
  const n=norm(input); if(!n.trim())return false;
  return keys.some(alt=>alt.every(t=>hasTok(n,t)));
}

/* ---------- State ---------- */
let MODE='recall';
let order=[], pos=0, score=0, streak=0, attempted=0;
let checked=false, finalizedThis=false, flipped=false, mcOpts=null, mcAnswered=false;
const el=id=>document.getElementById(id);
const card=el('card');
const MODE_LBL={recall:'Recall',flash:'Flashcards',mc:'Quiz',full:'Full CH-9',ch5:'CH-5 Quiz',ch5n:'CH-5 Limits',ho:'Handouts'};
function bank(){return MODE==='full'?QFULL:MODE==='ch5'?QCH5:MODE==='ch5n'?QLIM:MODE==='ho'?QHO:Q;}


let selCats=null;        // null = uninitialised for this bank; else explicit set (may be empty)
let menuOpen=false;
function catList(){return [...new Set(bank().map(q=>q.cat))];}
function allSelected(){const c=catList();return !!selCats && selCats.size===c.length;}
function noneSelected(){return !!selCats && selCats.size===0;}
function buildCats(){
  const B=bank(), cats=catList();
  if(!selCats) selCats=new Set(cats);
  const cnt=c=>B.filter(q=>q.cat===c).length;
  const allOn=allSelected();
  el('catBtn').innerHTML=`Categories: ${catLabel()} <span class="car">\u25be</span>`;
  el('catBtn').setAttribute('aria-expanded',menuOpen?'true':'false');
  el('catMenu').classList.toggle('open',menuOpen);
  el('catMenu').innerHTML=
    `<div class="catrow allrow" data-c="__all" role="menuitemcheckbox" aria-checked="${allOn}"><input type="checkbox" ${allOn?'checked':''}> ${allOn?'Deselect all':'Select all'} <span class="cnt">${B.length}</span></div>`+
    cats.map(c=>`<div class="catrow" data-c="${c.replace(/"/g,'&quot;')}" role="menuitemcheckbox"><input type="checkbox" ${selCats.has(c)?'checked':''}> ${c} <span class="cnt">${cnt(c)}</span></div>`).join('');
  el('catMenu').querySelectorAll('.catrow').forEach(r=>{
    r.onclick=e=>{
      e.stopPropagation();
      const c=r.dataset.c;
      if(c==='__all'){
        if(allSelected()) selCats.clear();
        else selCats=new Set(cats);
      }
      else if(selCats.has(c)) selCats.delete(c);
      else selCats.add(c);
      buildCats(); makeOrder();
    };
  });
}
function catLabel(){
  if(!selCats||allSelected())return 'All';
  if(selCats.size===0)return 'None';
  if(selCats.size<=2)return [...selCats].join(' + ');
  return selCats.size+' categories';
}
function makeOrder(){
  const B=bank();
  if(!selCats) selCats=new Set(catList());
  order=B.map((q,i)=>i).filter(i=>selCats.has(B[i].cat));
  if(el('shuffle').checked){for(let i=order.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[order[i],order[j]]=[order[j],order[i]];}}
  pos=0;score=0;streak=0;attempted=0;
  el('fCat').textContent=`${catLabel()} · ${order.length} items · ${MODE_LBL[MODE]}`;
  render();
}
function setMode(m){
  if(MODE===m)return;
  MODE=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===m));
  el('lenWrap').style.display = m==='recall' ? '' : 'none';
  selCats=null;              // categories differ between banks — reset to all
  menuOpen=false;
  buildCats();
  makeOrder();
}
function updStats(){
  el('sPos').textContent=`${Math.min(pos+1,order.length)}/${order.length}`;
  el('sScore').textContent=score; el('sStreak').textContent=streak;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function msgbar(){ return ''; }  // top bar removed
function stepsHTML(q){
  return q.steps.map((s,i)=>`
    ${s.cond?`<div class="fcond">${esc(s.cond)}:</div>`:''}
    <div class="fs"><span class="fn">${q.single?'▸':(i+1)+'.'}</span><span>${esc(s.c)}</span></div>`).join('');
}

/* ---------- Shared finalize / next ---------- */
function finalize(right){
  if(finalizedThis)return;finalizedThis=true;attempted++;
  if(right){score++;streak++;}else{streak=0;}
  updStats();
  const n=el('bNext'); if(n){n.textContent='Next ▸';n.classList.remove('ghost');n.classList.add('primary');}
  const c=el('bCheck'); if(c)c.disabled=true;
}
function next(){
  if(!finalizedThis){
    if(MODE==='recall'&&checked){finalize(false);}
    else{attempted++;streak=0;} // skipped
  }
  pos++;render();
}

/* ---------- Render dispatch ---------- */
function render(){
  checked=false;finalizedThis=false;flipped=false;mcOpts=null;mcAnswered=false;
  updStats();
  if(noneSelected()||order.length===0){return emptyState();}
  if(pos>=order.length){return results();}
  if(MODE==='recall')renderRecall();
  else if(MODE==='flash')renderFlash();
  else if(MODE==='ch5'||MODE==='ho')renderCh5();
  else if(MODE==='ch5n')renderLimits();
  else renderMC();            // 'mc' and 'full' both use MC renderer, on their own banks
}

/* ---------- Mode: Recall ---------- */
function renderRecall(){
  const q=bank()[order[pos]];
  const rows=q.steps.map((s,i)=>`
    ${s.cond?`<div class="cond">${esc(s.cond)}:</div>`:''}
    <div class="row" data-i="${i}">
      <div class="n mono">${q.single?'▸':i+1}</div>
      <input class="mono" id="in${i}" autocomplete="off" autocapitalize="off" spellcheck="false"
        placeholder="${q.single?'type your recall…':'step '+(i+1)+'…'}">
      <div class="mk" id="mk${i}"></div>
    </div>
    <div class="ans mono" id="ans${i}"></div>`).join('');
  card.innerHTML=`${msgbar(q)}
    <div class="body">
      <div class="msg">${esc(q.msg)}</div>
      <div class="ref mono">TM ¶ ${q.ref}</div>
      ${q.sub?`<p class="sub">${esc(q.sub)}</p>`:''}
      <div class="prompt">${q.single?'Answer:':'Enter each step:'}</div>
      <div class="rows">${rows}</div>
      <div class="actions">
        <button class="btn primary" id="bCheck">Check</button>
        <button class="btn ghost" id="bReveal">Reveal</button>
        <button class="btn" id="bNext">Skip ▸</button>
      </div>
      <div class="grade" id="grade"><span>Your call:</span>
        <button class="gbtn right" id="gRight">✓ Got it</button>
        <button class="gbtn wrong" id="gWrong">✕ Missed</button>
      </div>
    </div>`;
  el('bCheck').onclick=check;
  el('bReveal').onclick=reveal;
  el('bNext').onclick=next;
  el('gRight').onclick=()=>selfGrade(true);
  el('gWrong').onclick=()=>selfGrade(false);
  const ins=q.steps.map((_,i)=>el('in'+i));
  ins.forEach((inp,i)=>inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();
      if(!checked){ if(i<ins.length-1&&ins[i+1].value.trim()===''&&inp.value.trim()!==''){ins[i+1].focus();} else {check();} }
      else{ next(); }
    }}));
  ins[0].focus();
}
function evalRows(){
  const q=bank()[order[pos]];let allOK=true;
  q.steps.forEach((s,i)=>{
    const ok=stepOK(el('in'+i).value,s.k);
    const row=card.querySelector(`.row[data-i="${i}"]`);
    row.classList.toggle('ok',ok);row.classList.toggle('bad',!ok);
    el('mk'+i).textContent=ok?'✓':'✕';
    if(!ok)allOK=false;
  });
  return allOK;
}
function check(){
  const allOK=evalRows();checked=true;
  if(allOK){finalize(true);}
  else{el('grade').classList.add('show');el('bCheck').textContent='Re-check';}
}
function reveal(){
  const q=bank()[order[pos]];
  q.steps.forEach((s,i)=>{el('ans'+i).textContent='▸ '+s.c;});
  if(!checked)evalRows();checked=true;
  el('grade').classList.add('show');
}
function selfGrade(right){
  if(finalizedThis)return;
  finalize(right);
  el('gRight').style.opacity=right?1:.3;el('gWrong').style.opacity=right?.3:1;
}

/* ---------- Mode: Flashcards ---------- */
function renderFlash(){
  const q=bank()[order[pos]];
  card.innerHTML=`${msgbar(q)}
    <div class="body">
      <div class="msg">${esc(q.msg)}</div>
      <div class="ref mono">TM ¶ ${q.ref}</div>
      ${q.sub?`<p class="sub">${esc(q.sub)}</p>`:''}
      <div class="fc" id="fc" role="button" tabindex="0" aria-label="Reveal steps">
        <div class="hint">Recall the steps — tap to reveal</div>
      </div>
      <div class="actions">
        <button class="btn danger" id="bMiss">✕ Missed</button>
        <button class="btn primary" id="bGot">✓ Got it</button>
        <button class="btn ghost" id="bNext">Skip ▸</button>
      </div>
    </div>`;
  const fc=el('fc');
  const flip=()=>{ if(flipped)return; flipped=true;
    fc.classList.add('flipped'); fc.innerHTML=stepsHTML(q); };
  fc.onclick=flip;
  fc.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();flip();}};
  el('bMiss').onclick=()=>{finalize(false);pos++;render();};
  el('bGot').onclick=()=>{finalize(true);pos++;render();};
  el('bNext').onclick=next;
}

/* ---------- Mode: Quiz (multiple choice — used by 'mc' and 'full') ---------- */
function buildMC(q,qi){
  const B=bank();
  const key=x=>x.steps.map(s=>s.c).join('|');
  const correct={steps:q.steps,ok:true};
  const seen=new Set([key(q)]);
  const pool=[...B.map((x,i)=>i).filter(i=>i!==qi)];
  pool.sort((a,b)=>{
    const ca=(B[a].cat===q.cat)|0, cb=(B[b].cat===q.cat)|0;
    if(cb!==ca)return cb-ca;
    const da=Math.abs(B[a].steps.length-q.steps.length), db=Math.abs(B[b].steps.length-q.steps.length);
    if(da!==db)return da-db;
    return Math.random()-0.5;
  });
  const ds=[];
  for(const i of pool){
    if(ds.length>=3)break;
    const cand=B[i]; const kk=key(cand);
    if(seen.has(kk))continue;
    seen.add(kk); ds.push({steps:cand.steps,ok:false});
  }
  const opts=[correct,...ds];
  for(let i=opts.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[opts[i],opts[j]]=[opts[j],opts[i]];}
  return opts;
}
function renderMC(){
  const q=bank()[order[pos]];
  mcOpts=buildMC(q,order[pos]);
  const letters=['A','B','C','D'];
  const optHTML=mcOpts.map((o,i)=>`
    <div class="opt" data-i="${i}" role="button" tabindex="0">
      <div class="l">${letters[i]}</div>
      <div class="steps">${o.steps.map((s,j)=>`<div>${o.steps.length>1?(j+1)+'. ':''}${esc(s.c)}${s.cond?' <i style="color:var(--amber);font-style:normal;font-size:11px">('+esc(s.cond)+')</i>':''}</div>`).join('')}</div>
    </div>`).join('');
  card.innerHTML=`${msgbar(q)}
    <div class="body">
      <div class="msg">${esc(q.msg)}</div>
      <div class="ref mono">TM ¶ ${q.ref}</div>
      ${q.sub?`<p class="sub">${esc(q.sub)}</p>`:''}
      <div class="opts">${optHTML}</div>
      <div class="actions">
        <button class="btn ghost" id="bNext">Skip ▸</button>
      </div>
    </div>`;
  el('bNext').onclick=next;
  card.querySelectorAll('.opt').forEach(node=>{
    const pick=()=>{
      if(mcAnswered)return; mcAnswered=true;
      const i=+node.dataset.i, right=mcOpts[i].ok;
      card.querySelectorAll('.opt').forEach(n2=>{
        const j=+n2.dataset.i;
        n2.classList.add('locked');
        if(mcOpts[j].ok)n2.classList.add('correct');
        else if(j===i)n2.classList.add('wrong');
        else n2.classList.add('dim');
      });
      finalize(right);
    };
    node.onclick=pick;
    node.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();pick();}};
  });
}


/* ---------- Mode: CH-5 Quiz (predefined-option multiple choice) ---------- */
function renderCh5(){
  const q=bank()[order[pos]];
  // shuffle option order, remember where the correct one lands
  const idx=q.opts.map((_,i)=>i);
  for(let i=idx.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[idx[i],idx[j]]=[idx[j],idx[i]];}
  const letters=['A','B','C','D'];
  card.innerHTML=`
    <div class="body">
      <div class="msg">${esc(q.msg)}</div>
      <div class="ref mono">${MODE==='ho'?'Slide '+q.ref.slice(1):'TM ¶ '+q.ref}</div>
      ${q.sub?`<p class="sub">${esc(q.sub)}</p>`:''}
      <div class="opts">${idx.map((oi,i)=>`
        <div class="opt" data-ok="${oi===q.a?1:0}" role="button" tabindex="0">
          <div class="l">${letters[i]}</div>
          <div class="steps"><div>${esc(q.opts[oi])}</div></div>
        </div>`).join('')}</div>
      <div class="actions">
        <button class="btn ghost" id="bNext">Skip ▸</button>
      </div>
    </div>`;
  el('bNext').onclick=next;
  card.querySelectorAll('.opt').forEach(node=>{
    const pick=()=>{
      if(mcAnswered)return; mcAnswered=true;
      const right=node.dataset.ok==='1';
      card.querySelectorAll('.opt').forEach(n2=>{
        n2.classList.add('locked');
        if(n2.dataset.ok==='1')n2.classList.add('correct');
        else if(n2===node)n2.classList.add('wrong');
        else n2.classList.add('dim');
      });
      finalize(right);
    };
    node.onclick=pick;
    node.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();pick();}};
  });
}

/* ---------- Mode: CH-5 Limits (numeric entry + Check) ---------- */
function parseNum(v){
  const m=String(v).replace(/,/g,'').match(/-?\d+(?:\.\d+)?/);
  return m?parseFloat(m[0]):null;
}
function renderLimits(){
  const q=bank()[order[pos]];
  const rows=q.fields.map((f,i)=>`
    <div class="row" data-i="${i}">
      <div class="lbl">${esc(f.l)} <span class="unit">${esc(f.u)}</span></div>
      <input class="mono num" id="in${i}" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="—">
      <div class="mk" id="mk${i}"></div>
    </div>
    <div class="ans mono" id="ans${i}"></div>`).join('');
  card.innerHTML=`
    <div class="body">
      <div class="msg">${esc(q.msg)}</div>
      <div class="ref mono">TM ¶ ${q.ref}</div>
      <div class="prompt">Enter the limits:</div>
      <div class="rows">${rows}</div>
      <div class="actions">
        <button class="btn primary" id="bCheck">Check</button>
        <button class="btn ghost" id="bReveal">Reveal</button>
        <button class="btn" id="bNext">Skip ▸</button>
      </div>
    </div>`;
  const ins=q.fields.map((_,i)=>el('in'+i));
  const evalLim=()=>{
    let all=true;
    q.fields.forEach((f,i)=>{
      const v=parseNum(ins[i].value);
      const ok=v!==null&&Math.abs(v-f.a)<0.001;
      const row=card.querySelector(`.row[data-i="${i}"]`);
      row.classList.toggle('ok',ok);row.classList.toggle('bad',!ok);
      el('mk'+i).textContent=ok?'✓':'✕';
      if(!ok){el('ans'+i).textContent='▸ '+f.a+' '+f.u; all=false;}
    });
    return all;
  };
  el('bCheck').onclick=()=>{
    if(finalizedThis)return;
    checked=true;
    finalize(evalLim());
  };
  el('bReveal').onclick=()=>{
    if(finalizedThis)return;
    q.fields.forEach((f,i)=>{el('ans'+i).textContent='▸ '+f.a+' '+f.u;});
    evalLim(); checked=true; finalize(false);
  };
  el('bNext').onclick=next;
  ins.forEach((inp,i)=>inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();
      if(finalizedThis){next();}
      else if(i<ins.length-1){ins[i+1].focus();}
      else{el('bCheck').click();}
    }}));
  ins[0].focus();
}

/* ---------- Empty state ---------- */
function emptyState(){
  card.innerHTML=`<div class="results">
     <div class="big" style="color:var(--dim);font-size:56px">—</div>
     <div class="lbl">No categories selected</div>
     <p>Open <b>Categories</b> and choose at least one to start this test.</p>
     <div class="actions" style="max-width:320px;margin:0 auto">
       <button class="btn primary" id="pickAll">Select all</button>
     </div>
   </div>`;
  el('sPos').textContent='0/0';
  el('pickAll').onclick=()=>{selCats=new Set(catList());buildCats();makeOrder();};
}

/* ---------- Results ---------- */
function results(){
  const pct=attempted?Math.round(score/attempted*100):0;
  const msg = pct>=90?"Checklist-sharp. Memory items are solid.":
              pct>=70?"Solid. Tighten the misses and run it again.":
              pct>=40?"Getting there — drill the reveals, then re-shuffle.":
              "Early days. Reveal each answer, then retry the set.";
  card.innerHTML=`<div class="results">
     <div class="big">${pct}%</div>
     <div class="lbl">${score} / ${attempted} correct · ${MODE_LBL[MODE]}</div>
     <p>${msg}</p>
     <div class="actions" style="max-width:320px;margin:0 auto">
       <button class="btn primary" id="again">Run set again</button>
       <button class="btn" id="reshuffle">Reshuffle ⇄</button>
     </div>
   </div>`;
  el('sPos').textContent=`${order.length}/${order.length}`;
  el('again').onclick=()=>{pos=0;score=0;streak=0;attempted=0;render();};
  el('reshuffle').onclick=makeOrder;
}

/* ---------- Wire up ---------- */
buildCats();
el('catBtn').onclick=e=>{e.stopPropagation();menuOpen=!menuOpen;buildCats();};
document.addEventListener('click',e=>{if(menuOpen&&!el('catdd').contains(e.target)){menuOpen=false;buildCats();}});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&menuOpen){menuOpen=false;buildCats();}});
el('shuffle').onchange=makeOrder;
el('restart').onclick=makeOrder;
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setMode(t.dataset.m));
makeOrder();
</script>

<style>
  :root{
    --bg:#0a0e11; --panel:#121a20; --panel2:#18232b; --line:#26333d;
    --ink:#e9eef1; --muted:#8598a4; --dim:#5d6e79;
    --go:#37d98a; --amber:#ffb224; --warn:#ff5d5d; --sky:#4aa8ff;
    --shadow:0 1px 0 rgba(255,255,255,.03), 0 10px 30px rgba(0,0,0,.5);
    --disp:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:
     radial-gradient(1200px 600px at 80% -10%, #12212b 0%, transparent 60%),
     var(--bg);
     color:var(--ink);font-family:var(--disp);-webkit-text-size-adjust:100%;font-size:17px;}
  body{min-height:100vh;display:flex;justify-content:center;
    padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right))
            max(16px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left))}
  .wrap{width:100%;max-width:760px}
  .mono{font-family:var(--mono)}
  .cond,h1,h2,.btn,.msg,.stat b,.tab{font-family:var(--disp)}

  header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
    padding:14px 4px 16px;border-bottom:1px solid var(--line);margin-bottom:14px}
  h1{margin:0;font-weight:600;letter-spacing:.05em;font-size:22px;text-transform:uppercase;line-height:1.05}
  h1 span{color:var(--dim);display:block;font-size:11px;letter-spacing:.22em;font-weight:400;margin-top:4px}
  .instr{display:flex;gap:14px;text-align:right}
  .stat{min-width:52px}
  .stat b{display:block;font-size:26px;line-height:1;color:var(--go)}
  .stat.streak b{color:var(--amber)} .stat.of b{color:var(--sky)}
  .stat s{display:block;font-size:10px;letter-spacing:.18em;color:var(--dim);text-decoration:none;margin-top:5px;text-transform:uppercase}

  .tabs{display:flex;gap:6px;margin-bottom:12px}
  .tab{flex:1;text-align:center;padding:13px 4px;border:1px solid var(--line);border-radius:10px;
    background:var(--panel2);color:var(--muted);font-size:13px;letter-spacing:.06em;
    text-transform:uppercase;cursor:pointer;transition:.12s;user-select:none}
  .tab:hover{border-color:var(--muted)}
  .tab.on{background:var(--sky);color:#04121f;border-color:var(--sky);font-weight:600}
  .tab.full.on{background:var(--amber);border-color:var(--amber)}
  .tab.c5.on{background:var(--go);border-color:var(--go);color:#052015}
  .tab.ho.on{background:#b48cff;border-color:#b48cff;color:#140a24}

  .controls{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
  .catdd{position:relative}
  .catbtn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:9px;
    padding:11px 14px;font-size:14px;letter-spacing:.05em;cursor:pointer;font-family:var(--disp);
    display:inline-flex;align-items:center;gap:8px;transition:.12s;text-transform:uppercase}
  .catbtn:hover{border-color:var(--muted)}
  .catbtn .car{color:var(--dim);font-size:10px}
  .catmenu{position:absolute;top:calc(100% + 6px);left:0;z-index:40;min-width:min(300px,86vw);max-height:60vh;overflow:auto;
    background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px;display:none;
    box-shadow:0 14px 34px rgba(0,0,0,.55)}
  .catmenu.open{display:block}
  .catrow{display:flex;align-items:center;gap:11px;padding:13px 11px;border-radius:8px;cursor:pointer;
    font-size:14px;letter-spacing:.05em;color:var(--ink);text-transform:uppercase;user-select:none}
  .catrow:hover{background:#0c1318}
  .catrow input{accent-color:var(--go);width:20px;height:20px;pointer-events:none;flex:0 0 auto}
  .catrow .cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--dim)}
  .catrow.allrow{border-bottom:1px solid var(--line);border-radius:7px 7px 0 0;margin-bottom:4px}
  .chk{display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.06em;color:var(--muted);cursor:pointer;user-select:none;text-transform:uppercase}
  .chk input{accent-color:var(--go);width:19px;height:19px}

  .card{background:linear-gradient(180deg,var(--panel) 0%,#0f171d 100%);border:1px solid var(--line);
    border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .ref{font-size:12px;color:var(--dim);letter-spacing:.12em;margin:2px 0 14px}

  .body{padding:20px 16px 22px}
  .msg{font-size:29px;font-weight:600;letter-spacing:.01em;line-height:1.12;text-transform:uppercase;margin:4px 0 4px}
  .sub{color:var(--muted);font-size:15px;line-height:1.45;margin:0 0 18px}
  .qmsg{font-size:21px;font-weight:600;line-height:1.4;letter-spacing:.005em;margin:4px 0 18px;color:var(--ink);text-transform:none}
  @media (max-width:560px){.qmsg{font-size:19px}}
  .msg.q{font-size:21px;text-transform:none;letter-spacing:0;line-height:1.4}
  .prompt{color:var(--dim);font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}

  .rows{display:flex;flex-direction:column;gap:9px}
  .cond{font-size:11px;letter-spacing:.05em;color:var(--amber);text-transform:uppercase;margin:8px 2px 1px;opacity:.9}
  .row{display:flex;align-items:stretch;gap:0;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#0c1318;transition:border-color .15s}
  .row .n{flex:0 0 42px;display:flex;align-items:center;justify-content:center;background:var(--panel2);color:var(--dim);font-size:13px;border-right:1px solid var(--line)}
  .row input{flex:1;background:transparent;border:0;color:var(--ink);padding:15px 13px;font-size:16px;letter-spacing:.02em;outline:none;font-family:var(--mono)}
  .row input::placeholder{color:#3f4d57}
  .row .mk{flex:0 0 42px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--dim)}
  .row.ok{border-color:var(--go)} .row.ok .n{color:var(--go)} .row.ok .mk{color:var(--go)}
  .row.bad{border-color:var(--warn)} .row.bad .mk{color:var(--warn)}
  .ans{padding:3px 12px 0 55px;font-size:13px;color:var(--go);letter-spacing:.02em;min-height:0;font-family:var(--mono)}
  .ans:empty{display:none}
  .row .lbl{flex:1 1 48%;display:flex;align-items:center;gap:8px;background:var(--panel2);
    border-right:1px solid var(--line);padding:10px 11px;font-size:13px;color:var(--muted);
    letter-spacing:.03em;text-transform:uppercase;line-height:1.25}
  .row .lbl .unit{color:var(--sky);font-family:var(--mono);font-size:11px;white-space:nowrap}
  .row input.num{flex:1 1 52%;min-width:90px;text-align:right}

  /* flashcards */
  .fc{border:1px dashed var(--line);border-radius:12px;min-height:190px;display:flex;align-items:center;justify-content:center;
      padding:20px;cursor:pointer;background:#0c1318;text-align:center;transition:border-color .15s}
  .fc:hover{border-color:var(--muted)}
  .fc .hint{color:var(--dim);letter-spacing:.14em;text-transform:uppercase;font-size:13px}
  .fc.flipped{cursor:default;border-style:solid;border-color:var(--sky);display:block;text-align:left}
  .fs{display:flex;gap:11px;padding:6px 0;font-size:16px;line-height:1.5}
  .fs .fn{flex:0 0 22px;color:var(--sky);font-family:var(--mono);font-size:13px}
  .fcond{color:var(--amber);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 0}

  /* multiple choice */
  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{border:1px solid var(--line);border-radius:11px;padding:14px 14px;background:#0c1318;cursor:pointer;display:flex;gap:11px;transition:.12s}
  .opt:hover{border-color:var(--muted)}
  .opt .l{flex:0 0 24px;color:var(--sky);font-weight:700;font-family:var(--mono);font-size:16px}
  .opt .steps{font-size:15px;line-height:1.5;color:var(--ink)}
  .opt .steps div{padding:1px 0}
  .opt.correct{border-color:var(--go);background:rgba(55,217,138,.07)} .opt.correct .l{color:var(--go)}
  .opt.wrong{border-color:var(--warn);background:rgba(255,93,93,.07)} .opt.wrong .l{color:var(--warn)}
  .opt.dim{opacity:.4}
  .opt.locked{cursor:default}

  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .btn{flex:1 1 auto;min-width:104px;text-align:center;padding:15px 16px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:14px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:.12s}
  .btn:hover{border-color:var(--muted)}
  .btn.primary{background:var(--go);color:#052015;border-color:var(--go);font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.danger{border-color:rgba(255,93,93,.5)}

 it has a much higher flash point than MIL-PRF-83282","MIL-PRF-83282 — it has better low-temperature flow than MIL-H-5606","MIL-H-5606 — it is required at all ambient temperatures above -32 °C"]},{"cat":"Hydraulic System","msg":"MIL-H-5606 shall be used at which ambient temperatures?","a":0,"opts":["Between -25 and -40 °F (-32 and -40 °C)","At -25 °F (-32 °C) and above","Below -40 °F (-40 °C) only","Between 0 and -25 °F only"]},{"cat":"Hydraulic System","msg":"What is required if MIL-H-5606 and MIL-PRF-83282 fluids are mixed?","a":0,"opts":["An entry on DA Form 2408-13-1 and 2408-13-1-E","Draining and re-servicing within 5 hours of operation","Replacement of the hydraulic pump within 5 hours","No action; the fluids are fully compatible"]},{"cat":"Hydraulic System","msg":"Where is the hydraulic reservoir located?","a":0,"opts":["On the cabin roof, forward and left of the transmission","On the cabin roof, forward and right of the transmission","On the right outboard cabin roof, inboard of the filters","In the aft electrical compartment"]},{"cat":"Hydraulic System","msg":"When is the hydraulic reservoir fluid level normal?","a":0,"opts":["When hydraulic fluid completely fills the sight glass","When fluid is at the center of the sight glass","When fluid is between the yellow indicators on the sight glass","When fluid covers the lower half of the sight glass"]},{"cat":"Hydraulic System","msg":"Where is the hydraulic pump mounted and what drives it?","a":0,"opts":["Left forward side of the transmission, driven by the transmission","Right forward side of the transmission, driven by the transmission","Left forward side of the transmission, driven by the accessory gearbox","On the engine accessory gearbox, driven by NG"]},{"cat":"Hydraulic System","msg":"Which three lines come off the hydraulic pump?","a":0,"opts":["Pump seal drain line, case drain line, and pressure line","Overboard scupper drain, systems return line, and pump supply line","Pressure line, return line, and case drain line","Pump supply line, pressure line, and seal drain line"]},{"cat":"Hydraulic System","msg":"What is the function of the case drain line?","a":0,"opts":["Returns flow used for pump cooling and lubrication to the reservoir","Returns leakage past the pump seal to the reservoir","Carries flow to the system and the cylinders","Returns unfiltered fluid to the reservoir when the filter is clogged"]},{"cat":"Hydraulic System","msg":"What micron rating do the hydraulic pressure and return filter elements have?","a":0,"opts":["5 micron, cleanable","3 micron, cleanable","10 micron, cleanable","45 micron, cleanable"]},{"cat":"Hydraulic System","msg":"At what differential pressure does the hydraulic filter pop-up indicator extend?","a":0,"opts":["70 psi","100 psi","65 psi","35 psi"]},{"cat":"Hydraulic System","msg":"The hydraulic filter pop-up indicator is mechanically locked out under what condition?","a":0,"opts":["If a pressure surge occurs or temperature is below about 35 °F (1.66 °C ±15°)","If a pressure surge occurs or temperature is above about 35 °F (1.66 °C ±15°)","Whenever hydraulic pressure is below 800 PSI","Whenever the HYD SYS switch is OFF"]},{"cat":"Hydraulic System","msg":"If the hydraulic filter indicator remains in during run-up, what is the status of the helicopter?","a":0,"opts":["The helicopter is flyable","The helicopter is grounded until maintenance action","The helicopter is flyable only after an entry on DA Form 2408-13-1","The helicopter is flyable with hydraulics off"]},{"cat":"Hydraulic System","msg":"At what differential pressure does the return line by-pass check valve open?","a":0,"opts":["Higher than 100 PSI (±10)","Higher than 70 PSI (±10)","Higher than 65 PSI (±10)","Higher than 130 PSI (±10)"]},{"cat":"Hydraulic System","msg":"At what pressure differential is the hydraulic bypass mode automatically terminated?","a":0,"opts":["65 PSI","100 PSI","70 PSI","35 PSI"]},{"cat":"Hydraulic System","msg":"At what pressures does the hydraulic relief valve open and close?","a":0,"opts":["Opens at 1375 psi, closes below 1075 psi","Opens at 1075 psi, closes below 1375 psi","Opens at 1350 psi, closes below 1050 psi","Opens at 1375 psi, closes below 1000 psi"]},{"cat":"Hydraulic System","msg":"The hydraulic solenoid valve provides pressure to the system when it is in what state?","a":0,"opts":["De-energized","Energized","Spring-loaded open","Mechanically locked"]},{"cat":"Hydraulic System","msg":"Placing the HYD SYS switch to OFF has what effect on the solenoid valve?","a":0,"opts":["Energizes the valve; pump pressure is blocked and system pressure is connected back to the reservoir","De-energizes the valve; pump pressure is blocked and system pressure is connected back to the reservoir","Energizes the valve; pump pressure is routed directly to the actuators","De-energizes the valve; the relief valve opens to dump system pressure"]},{"cat":"Hydraulic System","msg":"Where is the hydraulic system switch located?","a":0,"opts":["On the SCAS control panel","On the forward overhead console","On the center post circuit breaker panel","On the pilot auxiliary control panel"]},{"cat":"Hydraulic System","msg":"At what pressure does the pressure switch open and delete the LOW HYD PRESS caution message?","a":0,"opts":["800 (±100) PSI","500 (±100) PSI","1000 (±50) PSI","650 (±100) PSI"]},{"cat":"Hydraulic System","msg":"Below what pressure will the LOW HYD PRESS caution display and SCAS disengage?","a":0,"opts":["500 (±100) PSI","800 (±100) PSI","650 (±100) PSI","400 (±100) PSI"]},{"cat":"Hydraulic System","msg":"Above what hydraulic pressure can SCAS be engaged?","a":0,"opts":["800 PSI","500 PSI","1000 PSI","650 PSI"]},{"cat":"Hydraulic System","msg":"What is the cracking pressure of the external pressure and return check valves?","a":0,"opts":["2–8 PSI","5–10 PSI","0.3 PSI","15 PSI"]},{"cat":"Hydraulic System","msg":"When hydraulic pressure is lost, what does the check valve design accomplish?","a":0,"opts":["It perm h — there is only one switch for pitch and roll","Loss of only the affected axis — each axis has its own switch","Loss of both pitch/roll and yaw","Automatic reversion to heading hold mode"]},{"cat":"Flight Controls / SCAS","msg":"How many yaw gyros are there and how many must work for yaw SCAS to function?","a":0,"opts":["Three total (two SCAS, one EGI) — any two working will keep yaw SCAS functioning","Three total (two SCAS, one EGI) — all three must work for yaw SCAS to function","Two total (both in SCAS) — both must work for yaw SCAS to function","Three total (one SCAS, two EGI) — any two working will keep yaw SCAS functioning"]},{"cat":"Flight Controls / SCAS","msg":"All three yaw gyros must function for which mode to work?","a":0,"opts":["Heading Hold Mode","Yaw SCAS","Pitch/Roll SCAS","Force trim"]},{"cat":"Flight Controls / SCAS","msg":"What advisory message displays when one portion of yaw SCAS malfunctions?","a":0,"opts":["ONE YAW CHAN OFF","YAW SCAS DEGRADE","YAW DISENGAGE","SCAS DISENGAGE"]},{"cat":"Flight Controls / SCAS","msg":"With the ONE YAW CHAN OFF advisory displayed, what is the status of the system?","a":0,"opts":["Full yaw SCAS authority exists in directional mode, but Heading Hold Mode is inoperative","Yaw SCAS authority is reduced by half, and Heading Hold Mode remains available","Yaw SCAS is fully lost, but Heading Hold Mode remains available","Full yaw SCAS authority exists, and Heading Hold Mode remains available"]},{"cat":"Flight Controls / SCAS","msg":"How does the Heading Hold Mode rotary actuator work?","a":0,"opts":["A small electric motor moves the pedals from neutral to stop position in either direction in 2 seconds","A hydraulic actuator moves the pedals from neutral to stop position in either direction in 2 seconds","A small electric motor moves the pedals from neutral to stop position in either direction in 5 seconds","A magnetic brake holds the pedals and the SCAS actuator moves the tail rotor directly"]},{"cat":"Flight Controls  three-phase, 60 Hz ±20, air cooled","120/208 VAC, three-phase, 400 Hz ±20, oil cooled"]},{"cat":"Electrical System","msg":"What drives the AC generator, and at what speed does it come on line?","a":0,"opts":["Driven by NP; comes on line at approximately 95% NP","Driven by NG; comes on line at approximately 95% NG","Driven by NP; comes on line at approximately 85% NP","Driven by the accessory gearbox NG train; comes on line at 50% NG"]},{"cat":"Electrical System","msg":"Which systems receive three-phase power from the AC generator?","a":0,"opts":["The MMS and the TRU","The MMS and the Hellfire system","The TRU and the panel lighting","The MMS, TRU, and avionics equipment"]},{"cat":"Electrical System","msg":"The AC generator control unit is preset to place the generator on line between which limits?","a":0,"opts":["112 and 125 volts","115 and 128 volts","108 and 120 volts","112 and 130 volts"]},{"cat":"Electrical System","msg":"What does the AC external power receptacle require?","a":0,"opts":["10 kva, 120/208 volts, three-phase, 400 Hz","10 kva, 115 volts, single-phase, 400 Hz","5 kva, 120/208 volts, three-phase, 400 Hz","10 kva, 120/208 volts, three-phase, 60 Hz"]},{"cat":"Electrical System","msg":"Can the helicopter be started from AC external power?","a":0,"opts":["No — the battery switches are OFF, so there is no way to power the starter","Yes — but only with the battery switches also ON","Yes — the AC external power unit can drive the starter directly","No — but it can be started from AC external power with the PART SEP CB in"]},{"cat":"Electrical System","msg":"During engine run-up, what happens at approximately 95% NP?","a":0,"opts":["The AC generator comes on line, picks up all AC loads, and the inverter goes to standby","The inverter comes on line, picks up all AC loads, and the AC generator goes to standby","The TRU comes on line and the AC generator goes to standby","The DC generator comes on line and picks up all DC loads"]},{"cat":"Electrical System","msg":"Once the TRU is on line, what is the DC generator's role?","a":0,"opts":["Battery charging only","Powering the 28 VDC essential bus only","Powering the inverter only","Powering the battery emergency bus only"]},{"cat":"Electrical System","msg":"Which caution messages indicate AC generator failure?","a":0,"opts":["MMS FAIL, AC GEN FAIL, and RECT FAIL","AC GEN FAIL, DC GEN FAIL, and INV FAIL","MMS FAIL, AC GEN FAIL, and INV FAIL","AC GEN FAIL and RECT FAIL only"]},{"cat":"Electrical System","msg":"Which systems are affected by an AC generator failure?","a":0,"opts":["MMS, TRU, and the Hellfire system","MMS, TRU, and SCAS","MMS, inverter, and the Hellfire system","TRU, SCAS, and panel lighting"]},{"cat":"Electrical System","msg":"Following a DC generator failure, at what NP is the TRU on line?","a":0,"opts":["At or above 91% NP","At or above 95% NP","At or above 85% NP","At or above 100% NP"]},{"cat":"Electrical System","msg":"Following a DC generator failure below 91% NP, what powers all DC systems except the ECU?","a":0,"opts":["The battery","The inverter","The TRU","The PMA"]},{"cat":"Electrical System","msg":"Above what NP is the ECU powered by the PMA?","a":0,"opts":["85% NP","91% NP","95% NP","70% NP"]},{"cat":"Electrical System","msg":"What caution message indicates a TRU failure, and what is the procedure?","a":0,"opts":["RECT FAIL — monitor the DC GEN load on the MPD and turn off equipment as necessary","TRU FAIL — monitor the DC GEN load on the MPD and turn off equipment as necessary","RECT FAIL — land as soon as practicable","DC GEN FAIL — monitor the DC GEN load on the MPD and turn off equipment as necessary"]},{"cat":"Electrical System","msg":"With inverter power OFF, what is lost below 91% NP?","a":0,"opts":["All AC powered equipment, including instrument lighting and SCAS","All DC powered equipment, including the FADEC and fuel boost pump","The MMS and Hellfire system only","The TRU and the 26 VAC bus only"]},{"cat":"Electrical System","msg":"During a complete electrical failure, what happens to the FADEC?","a":0,"opts":["It will continue to operate and control engine RPM if the PMA is functioning properly","It immediately reverts to manual mode regardless of PMA operation","It will continue to operate only if the battery is above 80% charge","It shuts down, and the engine will flame out"]},{"cat":"Electrical System","msg":"Before starting the engine, what are the correct electrical switch positions?","a":0,"opts":["ESNTL BUS — START; AC GEN — OFF; DC GEN — OFF; BATT 1 — BATT 1","ESNTL BUS — RUN; AC GEN — OFF; DC GEN — OFF; BATT 1 — BATT 1","ESNTL BUS — START; AC GEN — ON; DC GEN — ON; BATT 1 — BATT 1","ESNTL BUS — START; AC GEN — OFF; DC GEN — DC GEN; BATT 1 — BATT 1"]},{"cat":"Fuel System","msg":"Where is the fuel cell located?","a":0,"opts":["In the box-like structure in the avionics compartment, under the mast","In the box-like structure in the intermediate section, under the engine deck","In the lower crew compartment, forward of the avionics compartment","Under the cabin floor, between the crew seats"]},{"cat":"Fuel System","msg":"What is the fuel cell capacity and usable fuel?","a":0,"opts":["112 gallon capacity, 110 gallons usable","110 gallon capacity, 112 gallons usable","112 gallon capacity, 100 gallons usable","120 gallon capacity, 110 gallons usable"]},{"cat":"Fuel System","msg":"Up to what caliber is the fuel cell ballistically tolerant?","a":0,"opts":["7.62 mm","5.56 mm","12.7 mm","9 mm"]},{"cat":"Fuel System","msg":"Which refueling and defueling methods does the closed-circuit receptacle support?","a":0,"opts":["Closed circuit refueling with automatic shutoff, gravity refueling, open port refueling, and suction defueling","Closed circuit refueling with manual shutoff, gravity refueling, and pressure defueling","Closed circuit refueling with automatic shutoff and gravity refueling only","Closed circuit refueling, open port refueling, and gravity defueling only"]},{"cat":"Fuel System","msg":"What is the purpose of the sump drain valve?","a":0,"opts":["Drains unusable fuel, provides a fuel sample point, and drains condensation","Manually defuels usable fuel from the cell","Relieves static thermal expansion back to the fuel cell","Prevents air from entering the fuel line"]},{"cat":"Fuel System","msg":"What are the two purposes of the fuel boost pump?","a":0,"opts":["Supplies fuel to the engine-driven fuel pump to start the engine and maintains fuel pressure for high altitude flight","Supplies fuel to the engine-driven fuel pump and provides suction defueling capability","Maintains fuel pressure for high altitude flight and prevents air from entering the fuel line","Supplies fuel to the HMU and pressurizes the fuel cell during refueling"]},{"cat":"Fuel System","msg":"What is the maximum boost pump fuel pressure with no fuel flow?","a":0,"opts":["25 psi","12.5 psi","15 psi","5 psi"]},{"cat":"Fuel System","msg":"With a fuel flow output of 300 pounds per hour, what is the maximum boost pump fuel pressure?","a":0,"opts":["12.5 psi","25 psi","15 psi","5 psi"]},{"cat":"Fuel System","msg":"The fuel boost pump is protected by what circuit breaker?","a":0,"opts":["A 5-amp circuit breaker on the battery emergency bus","A 5-amp circuit breaker on the DC essential bus","A 10-amp circuit breaker on the battery emergency bus","A 5-amp circuit breaker on the power assured bus"]},{"cat":"Fuel System","msg":"The fuel boost pump switch must be ON during which conditions?","a":0,"opts":["Normal engine operations, normal flight conditions, and flights above 8,000 feet PA","Normal engine operations and flights above 5,000 feet PA only","Engine start only, and flights above 8,000 feet PA","Normal flight conditions and flights above 10,000 feet PA"]},{"cat":"Fuel System","msg":"At what pressure does the check valve open in the direction of flow?","a":0,"opts":["0.3 psi","15 psi","5 psi","2.5 psi"]},{"cat":"Fuel System","msg":"At what pressure does the relief valve open?","a":0,"opts":["15 psi","0.3 psi","25 psi","12.5 psi"]},{"cat":"Fuel System","msg":"How does the fuel quantity probe measure fuel?","a":0,"opts":["By determining capacitance","By measuring float position","By measuring resistance across the probe","By measuring differential pressure"]},{"cat":"Fuel System","msg":"At what fuel remaining is the low level fuel switch activated?","a":0,"opts":["97.5 pounds (15 gallons)","100 pounds (15 gallons)","97.5 pounds (10 gallons)","120 pounds (18 gallons)"]},{"cat":"Fuel System","msg":"A full tank of JP-8 on a standard day displays what fuel quantity?","a":0,"opts":["728 pounds","760 pounds","700 pounds","800 pounds"]},{"cat":"Fuel System","msg":"When does the fuel pressure switch illuminate the FUEL BOOST FAIL caution message?","a":0,"opts":["When the FUEL BOOST switch is in the FUEL BOOST position and fuel pressure drops below 5 psi","When the FUEL BOOST switch is in the FUEL BOOST position and fuel pressure drops below 4 psi","Whenever fuel pressure drops below 5 psi, regardless of switch position","When the FUEL BOOST switch is OFF and fuel pressure drops below 5 psi"]},{"cat":"Fuel System","msg":"What is the purpose of the orifice in the fuel shutoff valve?","a":0,"opts":["It allows for thermal expansion","It allows the boost pump to prime the line","It permits suction defueling","It prevents air from entering the fuel line"]},{"cat":"Fuel System","msg":"What selections are available for the fuel check length?","a":0,"opts":["20, 30, and 60 minutes","10, 20, and 30 minutes","15, 30, and 45 minutes","20, 40, and 60 minutes"]},{"cat":"Fuel System","msg":"What range and increment can the BINGO alarm time be set to?","a":0,"opts":["0.2 to 2.0 hours in increments of 0.1","0.1 to 2.0 hours in increments of 0.1","0.2 to 3.0 hours in increments of 0.2","0.5 to 2.0 hours in increments of 0.1"]},{"cat":"Fuel System","msg":"Which are the Army standard fuels?","a":0,"opts":["JP-8 and JET B (MIL-T-5624)","JP-8 and JP-5","JP-8 and JET A","JP-4 and JET B (MIL-T-5624)"]},{"cat":"Fuel System","msg":"Which alternate fuels contain an icing inhibitor?","a":0,"opts":["JP-5 and JET A-1","JET A and JET A-1","JP-5 and JET A","JP-8 and JET A-1"]},{"cat":"Fuel System","msg":"Is an entry in DA Form 2408-13 required when alternate fuels are mixed, and are emergency fuels approved?","a":0,"opts":["No entry is required; no emergency fuels are approved","An entry is required; no emergency fuels are approved","No entry is required; emergency fuels are approved for one flight","An entry is required; emergency fuels are approved with a torque restriction"]},{"cat":"Main Rotor","msg":"What does the swashplate assembly do?","a":0,"opts":["Converts non-rotating control inputs from the collective and cyclic to rotating control outputs to the main rotor","Converts rotating control inputs from the mast to non-rotating outputs at the pitch links","Transfers collective inputs only; cyclic inputs are transferred through the drive hub","Converts mast torque into an electrical signal for the torque indicator"]},{"cat":"Main Rotor","msg":"How many mast torque transducers provide signals for rotor RPM and the mast torque indicator?","a":0,"opts":["Two","Three","One","Four"]},{"cat":"Main Rotor","msg":"Which ring of the swashplate receives input from the cyclic actuators?","a":0,"opts":["The inner ring, which is non-rotating","The outer ring, which is non-rotating","The inner ring, which rotates with the mast","The outer ring, which rotates with the mast"]},{"cat":"Main Rotor","msg":"What prevents rotation of the swashplate inner ring?","a":0,"opts":["The anti-drive link and lever","The drive links and levers","The gimbal ring assembly","The duplex bearing"]},{"cat":"Main Rotor","msg":"How many pitch change links connect the swashplate to the main rotor blades?","a":0,"opts":["Four","Two","Three","Five"]},{"cat":"Main Rotor","msg":"On a completed assembly, the pitch change links are set at approximately what angle with the pitch horn?","a":0,"opts":["15 degrees","30 degrees","10 degrees","45 degrees"]},{"cat":"Main Rotor","msg":"What is the purpose of the swashplate boot?","a":0,"opts":["Prevents contamination of the uniball and duplex bearing","Retains grease in the duplex bearing only","Protects the magnetic pickup and interrupter","Prevents contamination of the pitch change links"]},{"cat":"Main Rotor","msg":"How is the main rotor hub described?","a":0,"opts":["Four bladed, soft-in-plane","Four bladed, rigid","Two bladed, semi-rigid","Four bladed, fully articulated"]},{"cat":"Main Rotor","msg":"What does soft-in-plane construction allow?","a":0,"opts":["Each blade operates independently and will lead, lag, and flap in a controlled manner due to elastomeric construction","Each blade flaps as a unit with the opposite blade about a teetering hinge","The blades are rigidly attached and rely on blade flexing alone","Each blade leads and lags freely, but flapping is restrained by the yoke"]},{"cat":"Main Rotor","msg":"What is the main rotor yoke made of and what does it allow?","a":0,"opts":["Lightweight fiberglass flexural type — allows flapping and coning of the main rotor blade","Forged aluminum alloy — allows flapping and coning of the main rotor blade","Lightweight fiberglass flexural type — allows lead and lag of the main rotor blade","Stainless steel — allows feathering of the main rotor blade"]},{"cat":"Main Rotor","msg":"What are the upper and lower plates made of and what do they contain?","a":0,"opts":["Forged aluminum alloy — with up and down stops at the outside edges to control flap","Fiberglass flexural material — with up and down stops at the outside edges to control flap","Forged aluminum alloy — with lead-lag stops at the outside edges","Stainless steel — with up and down stops to control coning"]},{"cat":"Main Rotor","msg":"In an elastomeric bearing, what role does the elastomer play?","a":0,"opts":["It is used as both a lubricant and as a structural material between surfaces","It is used only as a lubricant between the metal shims","It is used only as a structural material; grease provides lubrication","It transfers centrifugal loads directly to the mast"]},{"cat":"Main Rotor","msg":"Which three shear loads act on the elastomeric bearings?","a":0,"opts":["Torsional shear, axial shear, and misalignment shear","Torsional shear, radial shear, and misalignment shear","Axial shear, radial shear, and coning shear","Torsional shear, axial shear, and centrifugal shear"]},{"cat":"Main Rotor","msg":"What does the lead-lag damper bearing do?","a":0,"opts":["Dampens torsional loads from normal blade feathering and absorbs misalignment loads from lead, lag, and flapping","Transfers centrifugal load to the yoke and absorbs lead-lag forces","Transfers shear loads to the outboard pitch change bearing","Accommodates coning loads and transfers them to the upper and lower plates"]},{"cat":"Main Rotor","msg":"What does the outboard pitch change bearing do?","a":0,"opts":["Accommodates loads from lead-lag forces and transfers centrifugal load to the yoke","Dampens torsional loads brought about by normal blade feathering action","Transfers shear loads to the damper bearing","Provides the inboard feather bearing function"]},{"cat":"Main Rotor","msg":"What are the two blade retention bolts?","a":0,"opts":["A non-expandable bolt secured with washer, nut, and cotter pin, and an expandable pin type bolt for quick removal and blade folding","Two expandable pin type bolts, both allowing quick removal and blade folding","Two non-expandable bolts, both secured with washer, nut, and cotter pin","A non-expandable bolt and a shear bolt designed to fail in overload"]},{"cat":"Main Rotor","msg":"How is the main rotor blade constructed?","a":0,"opts":["Fiberglass spar of four uniaxial straps, three-ply fiberglass skin with Nomex honeycomb core, square tips","Aluminum spar, three-ply fiberglass skin with Nomex honeycomb core, square tips","Fiberglass spar of two uniaxial straps, fiberglass skin with aluminum honeycomb core, swept tips","Fiberglass spar of four uniaxial straps, fiberglass skin with aluminum honeycomb core, square tips"]},{"cat":"Main Rotor","msg":"What is the purpose of the main rotor blade balance weights, and what are their values?","a":0,"opts":["Provide blade inertia for autorotation — 6.5 pounds midspan and 2.2 pounds at the tip","Provide blade inertia for autorotation — 2.2 pounds midspan and 6.5 pounds at the tip","Provide spanwise balance — 6.5 pounds midspan and 2.2 pounds at the tip","Provide chordwise balance — 6.5 pounds midspan and 4.4 pounds at the tip"]},{"cat":"Main Rotor","msg":"What protects the main rotor blade leading edge?","a":0,"opts":["Estane material inboard and a stainless steel nickel-coated strip outboard","A stainless steel nickel-coated strip inboard and Estane material outboard","Estane material along the entire span","A titanium abrasion strip along the entire span"]},{"cat":"Main Rotor","msg":"On which blades are the expandable bolts installed on the leading edge?","a":0,"opts":["The red and green blades","The orange and blue blades","The red and blue blades","The green and orange blades"]},{"cat":"Main Rotor","msg":"What are the main rotor five second transient limits?","a":0,"opts":["107% to 125%","107% to 112%","100% to 107%","112% to 125%"]},{"cat":"Main Rotor","msg":"What are the autorotation rotor RPM limits?","a":0,"opts":["107% maximum, 90% minimum","107% maximum, 93% minimum","112% maximum, 90% minimum","107% maximum, 95% minimum"]},{"cat":"Main Rotor","msg":"What are the powered flight rotor RPM limits?","a":0,"opts":["107% maximum, 100% normal, 93% minimum","107% maximum, 100% normal, 90% minimum","112% maximum, 100% normal, 93% minimum","107% maximum, 95% normal, 93% minimum"]},{"cat":"Main Rotor","msg":"At what rotor RPM does the HIGH RPM warning occur, and what is the audio?","a":0,"opts":["107% — a three-bong-per-second tone","97% — a three-bong-per-second tone","107% — a warbling tone","100% — a three-bong-per-second tone"]},{"cat":"Main Rotor","msg":"Below what NR does the LOW RPM ROTOR warning activate, and what is the audio?","a":0,"opts":["Below 97% — a warbling tone","Below 93% — a warbling tone","Below 97% — a three-bong-per-second tone","Below 90% — a warbling tone"]},{"cat":"Main Rotor","msg":"Upper droop stop contact may occur during autorotational landings when rotor RPM is below what value?","a":0,"opts":["64%","74%","54%","84%"]},{"cat":"Main Rotor","msg":"Which combination can result in excessive coning and damage to the upper droop stops?","a":0,"opts":["Rotor RPM below 64%, failure to smoothly reduce collective full down, and aft cyclic during ground run","Rotor RPM below 64%, rapid collective application, and forward cyclic during ground run","Rotor RPM above 107%, aft cyclic, and abrupt collective reduction","Rotor RPM below 90%, centered cyclic, and full down collective"]},{"cat":"Main Rotor","msg":"If upper droop stop contact occurs, what is required?","a":0,"opts":["Record it on DA Form 2408-13-1/-1E so maintenance can inspect before continuing flight","No action is required — droop stop contact is not hazardous","Ground the aircraft immediately; it is not flyable","Note it in the remarks section only if lateral oscillations were felt"]},{"cat":"Tail Rotor","msg":"What supplies power to the tail rotor?","a":0,"opts":["The freewheeling unit, through shafts along the tailboom to the tail rotor gearbox","The main transmission, through shafts along the tailboom to the tail rotor gearbox","The accessory gearbox NG drive train, through the tail rotor driveshaft","The power turbine, directly through the tail rotor driveshaft"]},{"cat":"Tail Rotor","msg":"What is the tail rotor yoke made of, and what bearings does it use?","a":0,"opts":["Stainless steel with four Teflon impregnated, bronze lined spherical pitch change bearings","Aluminum alloy with four Teflon impregnated, bronze lined spherical pitch change bearings","Stainless steel with two elastomeric pitch change bearings","Stainless steel with four needle roller pitch change bearings"]},{"cat":"Tail Rotor","msg":"At what angle is the elastomeric flapping bearing and splined steel trunnion mounted into the yoke?","a":0,"opts":["30° (delta hinge)","45° (delta hinge)","15° (delta hinge)","60° (delta hinge)"]},{"cat":"Tail Rotor","msg":"What does the flapping action of the tail rotor blades accomplish?","a":0,"opts":["Equalizes lift between the advancing and retreating blade","Compensates for the delta hinge offset during pitch changes","Reduces the high frequency vibration inherent to the tail rotor","Allows the blades to lead and lag about the yoke"]},{"cat":"Tail Rotor","msg":"What is normal to observe on the tail rotor elastomeric flapping bearings?","a":0,"opts":["Minor cracks and extrusions of the elastomer","Complete absence of any cracking or extrusion","Sheeting and crumbling of the elastomer","Delamination at the bearing edges"]},{"cat":"Tail Rotor","msg":"Cracks or tears extending in excess of 360° in a tail rotor flapping bearing indicate what?","a":0,"opts":["Internal degradation of the bearings — the start of a slow, progressive bearing failure","Normal wear that requires no maintenance action","Imminent tail rotor failure requiring immediate shutdown","That the bearing has exceeded its service life but remains fully serviceable"]},{"cat":"Tail Rotor","msg":"Extrusions on the tail rotor flapping bearings will produce what in flight?","a":0,"opts":["A high frequency vibration, but will not cause tail rotor failure","A low frequency vibration, and may cause tail rotor failure","A high frequency vibration, and will lead to tail rotor failure if not corrected","No vibration; they can only be detected during preflight"]},{"cat":"Tail Rotor","msg":"What is the purpose of the tail rotor counterweight assembly?","a":0,"opts":["Balances pitch change and dynamic forces to maintain a given blade angle","Provides blade inertia for autorotation","Balances the blade chordwise to prevent high frequency vibration","Offsets the delta hinge moment during flapping"]},{"cat":"Tail Rotor","msg":"Why is the counterweight assembly significant if hydraulic pressure is lost?","a":0,"opts":["You can still change the blade angle in the event of tail rotor control failure","It prevents the tail rotor from going to a fixed pitch setting","It automatically drives the blades to a neutral pitch angle","It provides the flapping stop function for the tail rotor"]},{"cat":"Tail Rotor","msg":"How is the tail rotor hub and blades described?","a":0,"opts":["Two bladed, flapping, pusher type","Two bladed, rigid, tractor type","Two bladed, teetering, tractor type","Four bladed, flapping, pusher type"]},{"cat":"Tail Rotor","msg":"At what RPM does the tail rotor turn at 100% NR?","a":0,"opts":["2,381 RPM","2,183 RPM","6,016 RPM","1,832 RPM"]},{"cat":"Tail Rotor","msg":"What is the tail rotor diameter and chord?","a":0,"opts":["5 feet 5 inches diameter, 6.35 inch chord","5 feet 5 inches diameter, 5.35 inch chord","6 feet 5 inches diameter, 6.35 inch chord","5 feet 6 inches diameter, 6.53 inch chord"]},{"cat":"Tail Rotor","msg":"Why is the tail rotor blade a non-symmetrical design?","a":0,"opts":["For increased thrust","For reduced vibration","For increased durability","For a lower pitch change load"]},{"cat":"Tail Rotor","msg":"What is the purpose of the moisture drain hole on the tail rotor blade?","a":0,"opts":["To drain the cavity where the yoke fits into the butt of the blade","To drain the Nomex honeycomb core","To drain the pitch change bearing housing","To drain the cordwise balance weight support"]},{"cat":"Tail Rotor","msg":"What serves as the flapping stop for the tail rotor?","a":0,"opts":["The support","The spacer","The retaining nut","The crosshead assembly"]},{"cat":"Tail Rotor","msg":"What controls the lateral movement of the tail rotor pitch change tube?","a":0,"opts":["The anti-torque pedals","The crosshead assembly","The drive plate","The counterweight assembly"]},{"cat":"Tail Rotor","msg":"Outboard movement of the pitch change tube causes what?","a":0,"opts":["The crosshead assembly to move outboard, moving the pitch change links outboard and increasing blade angle","The crosshead assembly to move inboard, moving the pitch change links inboard and increasing blade angle","The pitch horn to rotate aft, decreasing blade angle","The drive plate to rotate, changing blade angle through the delta hinge"]},{"cat":"Tail Rotor","msg":"What are the indications of a complete loss of tail rotor thrust?","a":0,"opts":["Abnormal vibrations, pedal input has no effect, nose turns right (left sideslip), and left roll of fuselage","Abnormal vibrations, pedal input has no effect, nose turns left (right sideslip), and right roll of fuselage","Abnormal vibrations, frozen pedals, nose turns right, and right roll of fuselage","No vibration, pedal input has no effect, nose turns right, and left roll of fuselage"]},{"cat":"Tail Rotor","msg":"Below what airspeed may the helicopter sideslip become uncontrollable and begin to spin on its vertical axis?","a":0,"opts":["40 knots","50 knots","30 knots","60 knots"]},{"cat":"Tail Rotor","msg":"What are the indications of a fixed RIGHT pedal malfunction?","a":0,"opts":["It occurs at a low power setting, and the nose turns right as power is applied","It occurs at a high power setting, and the nose turns left as power is reduced","It occurs at a low power setting, and the nose turns left as power is applied","It occurs at a high power setting, and the nose turns right as power is applied"]},{"cat":"Tail Rotor","msg":"What are the indications of a fixed LEFT pedal malfunction?","a":0,"opts":["It occurs at a higher power setting, and the nose turns left as power is reduced","It occurs at a lower power setting, and the nose turns right as power is applied","It occurs at a higher power setting, and the nose turns right as power is reduced","It occurs at a lower power setting, and the nose turns left as power is reduced"]},{"cat":"Tail Rotor","msg":"With a fixed LEFT pedal malfunction, what airspeed range is used while continuing powered flight?","a":0,"opts":["Between 40 and 70 knots","Between 30 and 60 knots","Between 50 and 80 knots","Between 40 and 60 knots"]},{"cat":"Tail Rotor","msg":"If tail rotor thrust is excessively high with a fixed left pedal, engine RPM is reduced to what value?","a":0,"opts":["98% NP","95% NP","100% NP","93% NP"]},{"cat":"Tail Rotor","msg":"Under a fixed pedal malfunction, what is the effect of reducing throttle and/or collective?","a":0,"opts":["The nose yaws left","The nose yaws right","The nose yaws in the direction of the fixed pedal","There is no yaw effect; only pedal input changes heading"]},{"cat":"Tail Rotor","msg":"At a hover, what do you do if tail rotor pitch is fixed in a LEFT pedal position?","a":0,"opts":["Gradually decrease collective pitch and land the helicopter","Close the throttle and accomplish an autorotational landing","Increase collective and perform a run-on landing","Maintain the hover and perform an emergency shutdown"]},{"cat":"Tail Rotor","msg":"At a hover, what do you do with a total loss of tail rotor thrust or a fixed RIGHT pedal?","a":0,"opts":["Close the throttle and accomplish an autorotational landing","Gradually decrease collective pitch and land the helicopter","Maintain heading with throttle and perform a vertical landing","Increase collective and fly away to a run-on landing area"]},{"cat":"Tail Rotor","msg":"What are the indications of a loss of tail rotor components?","a":0,"opts":["Varying degrees of right yaw, forward CG shift, and abnormal vibrations","Varying degrees of left yaw, aft CG shift, and abnormal vibrations","Varying degrees of right yaw, aft CG shift, and no vibrations","Varying degrees of left yaw, forward CG shift, and abnormal vibrations"]},{"cat":"Tail Rotor","msg":"A loss of tail rotor components requires which cyclic input, and why?","a":0,"opts":["Aft cyclic — because of the forward center of gravity shift","Forward cyclic — because of the aft center of gravity shift","Left cyclic — to counteract the roll","Aft cyclic — to increase rotor RPM during the entry"]},{"cat":"Powertrain","msg":"What are the transmission input and output speeds?","a":0,"opts":["6,016 RPM input at 100% NP; 393 RPM output at 100% NR","6,016 RPM input at 100% NG; 393 RPM output at 100% NR","2,381 RPM input at 100% NP; 393 RPM output at 100% NR","6,016 RPM input at 100% NP; 2,381 RPM output at 100% NR"]},{"cat":"Powertrain","msg":"Where is the freewheeling unit installed?","a":0,"opts":["In the engine accessory gearbox","In the main transmission","Between the main driveshaft and the transmission","In the tail rotor gearbox"]},{"cat":"Powertrain","msg":"What type of clutch does the freewheeling unit use?","a":0,"opts":["A sprag-type freewheeling clutch","A centrifugal clutch","A roller-ramp overrunning clutch","A hydraulically actuated clutch"]},{"cat":"Powertrain","msg":"During autorotation, what happens in the freewheeling unit?","a":0,"opts":["The sprags disengage and the inner race continues to rotate, allowing the main rotor to drive the powertrain","The sprags engage and the outer race continues to rotate, allowing the engine to drive the powertrain","The sprags disengage and the outer race drives the tail rotor driveshaft","The sprags lock, connecting the engine to the rotor system"]},{"cat":"Powertrain","msg":"How is the freewheeling unit lubricated?","a":0,"opts":["From transmission oil, flowing to the manifold at 50–55 PSI","From engine oil, flowing to the manifold at 50–55 PSI","From transmission oil, flowing to the manifold at 30–35 PSI","By splash lubrication from the accessory gearbox"]},{"cat":"Powertrain","msg":"Where are the four chip detectors located?","a":0,"opts":["Freewheeling unit, tail rotor gearbox, and transmission (two)","Freewheeling unit, tail rotor gearbox, and accessory gearbox (two)","Tra ed at 700 SHP"]},{"cat":"Powerplant","msg":"What are the four major components of the engine?","a":0,"opts":["Compressor, combustion section, turbine, and accessory gearbox","Compressor, diffuser, turbine, and accessory gearbox","Compressor, combustion section, turbine, and exhaust","Compressor, combustion section, power turbine, and HMU"]},{"cat":"Powerplant","msg":"What are the four major systems of the engine?","a":0,"opts":["Engine fuel system, lubrication system, electrical system, and anti-icing system","Engine fuel system, lubrication system, ignition system, and anti-icing system","Engine fuel system, lubrication system, electrical system, and bleed air system","FADEC, lubrication system, electrical system, and anti-icing system"]},{"cat":"Powerplant","msg":"Which scales are displayed on the MPD vertical scale indicators?","a":0,"opts":["Engine oil pressure, engine oil temperature, and NG","Engine oil pressure, engine oil temperature, and NP","NR/NP, TGT, and mast torque","Engine oil pressure, TGT, and NG"]},{"cat":"Powerplant","msg":"Which parameters are on the vertical scale indicators located between the MFDs?","a":0,"opts":["Dual tachometer (NR and NP), TGT, and mast torque","Dual tachometer (NR and NG), TGT, and engine torque","Engine oil pressure and temperature, NG, and TGT","NR, NP, NG, and TGT"]},{"cat":"Powerplant","msg":"What does the throttle control, and how is it linked to the HMU?","a":0,"opts":["Controls NG; mechanically linked to the HMU fuel metering unit by the power lever angle (PLA) linkage","Controls NP; mechanically linked to the HMU fuel metering unit by the PLA linkage","Controls NG; electrically linked to the HMU through the ECU stepper motor","Controls NP; electrically linked to the ECU through the collective transducer"]},{"cat":"Powerplant","msg":"What are the pilot and CPG throttle travel amounts, and why do they differ?","a":0,"opts":["Pilot 180°, CPG 90° — the pilot has more travel for better throttle control during FADEC manu n at 61 °C and is fully open at 71 °C"]},{"cat":"Powerplant","msg":"With the ENG OIL BYPASS switch in AUTO and a low oil level, what happens?","a":0,"opts":["The electrical bypass valve opens, oil bypasses the cooler and is routed to the oil tank, and OIL BYP ENG displays","Engine oil continues to circulate through the oil cooler, and OIL BYP ENG displays","The bypass valve closes and oil is routed through the cooler at reduced flow","The LOW OIL QTY ENG caution displays but oil flow is unchanged"]},{"cat":"Powerplant","msg":"With the ENG OIL BYPASS switch in OFF and a low oil level, what happens?","a":0,"opts":["Engine oil continues to circulate through the oil cooler","The electrical bypass valve opens and oil bypasses the cooler","Oil flow to the engine bearings is reduced to conserve oil","The oil cooler blower is turned off"]},{"cat":"Powerplant","msg":"At normal engine oil quantity, what is the effect of placing the ENG OIL BYPASS switch in AUTO?","a":0,"opts":["No effect on engine oil flow","Oil bypasses the cooler and is routed to the oil tank","The oil cooler bypass valve opens partially","The OIL BYP ENG caution message displays"]},{"cat":"Powerplant","msg":"What is the internal engine oil filter rating, and at what psid does the bypass indicator extend?","a":0,"opts":["70 micron cleanable; button extends between 26 and 34 psid","10 micron cleanable; button extends between 26 and 34 psid","70 micron cleanable; button extends between 12 and 14 psid","70 micron cleanable; button extends between 100 and 105 psid"]},{"cat":"Powerplant","msg":"At what psid will oil completely bypass the internal engine oil filter?","a":0,"opts":["105 psid","34 psid","70 psid","26 psid"]},{"cat":"Powerplant","msg":"Where are the two engine chip detectors located and what do they sample?","a":0,"opts":["Lower at the bottom of the accessory gearbox sampling sump oil; upper on the accessory gearbox adjacent to the oil tank return line sampling scavenge oil","Lower at the bottom of unit and fuel pump","On the left side of the AGB, driven by the NG drive train; a fuel pump only","In the aft electrical compartment, driven electrically by the ECU"]},{"cat":"Powerplant","msg":"Where is the ECU located, and what powers it?","a":0,"opts":["In the aft electrical compartment; powered by aircraft DC power or by the PMA above 85% NP","In the avionics compartment; powered by aircraft DC power or by the PMA above 85% NP","In the aft electrical compartment; powered by aircraft DC power or by the PMA above 95% NP","On the engine accessory gearbox; powered by the PMA only"]},{"cat":"Powerplant","msg":"What is the PMA output that the ECU converts to DC power?","a":0,"opts":["13 VAC","28 VAC","115 VAC","26 VAC"]},{"cat":"Powerplant","msg":"At what psid does the fuel pressure differential switch illuminate the FUEL FILTER BYP caution message?","a":0,"opts":["0.75 ± 0.05 psid","1.25 to 1.50 psid","2.0 to 2.5 psid","0.3 psid"]},{"cat":"Powerplant","msg":"What is the fuel filter element rating, and at what psid does the impending bypass button activate?","a":0,"opts":["10 micron; button activates at 1.25 to 1.50 psid","10 micron; button activates at 2.0 to 2.5 psid","5 micron; button activates at 1.25 to 1.50 psid","10 micron; button activates at 0.75 ± 0.05 psid"]},{"cat":"Powerplant","msg":"At what psid will fuel bypass the fuel filter?","a":0,"opts":["2.0 to 2.5 psid","1.25 to 1.50 psid","0.75 ± 0.05 psid","3.0 to 3.5 psid"]},{"cat":"Powerplant","msg":"Below what fuel pressure does the LOW FUEL PRESS warning message display?","a":0,"opts":["4 psi","5 psi","2 psi","12.5 psi"]},{"cat":"Powerplant","msg":"When are the starter, igniter, and fuel boost pump sequenced OFF by the FADEC during an automatic start?","a":0,"opts":["At 50% NG","At 55% NG","At 65% NG","At 40% NG"]},{"cat":"Powerplant","msg":"During an automatic start, if TGT limits are exceeded, what does the FADEC do?","a":0,"opts":["Cuts off fuel flow and re-engages the starter for up to 60 seconds or until TGT decreases to 149 °C","Cuts off fuel flow and re-engages the starter for up to 30 seconds or until TGT decreases to 149 °C","Cuts off fuel flow and re-engages the starter for up to 60 seconds or until TGT decreases to 200 °C","Reduces fuel flow to minimum but continues the start sequence"]},{"cat":"Powerplant","msg":"At what TGT does the hot start abort sequence begin during a normal start?","a":0,"opts":["843 °C","927 °C","913 °C","802 °C"]},{"cat":"Powerplant","msg":"Are the FADEC automatic start features available in manual mode?","a":0,"opts":["No — these features are not available in the manual mode","Yes — the hot start abort logic works in both modes","Only the starter re-engagement feature is available in manual mode","Only the fuel cutoff feature is available in manual mode"]},{"cat":"Powerplant","msg":"At what NP is the SCFU NP overspeed control activated and reset?","a":0,"opts":["Activated at 116.9% NP, resets at 110.9% NP","Activated at 110.9% NP, resets at 116.9% NP","Activated at 112% NP, resets at 107% NP","Activated at 119% NP, resets at 112% NP"]},{"cat":"Powerplant","msg":"Upon activation, what does the NP overspeed system do?","a":0,"opts":["Rapidly reduces fuel flow but does not intentionally shut it off, allowing the engine to remain lit","Immediately shuts off fuel flow, causing a flameout","Reduces fuel flow and simultaneously reverts the FADEC to manual mode","Opens the AUTO/MAN changeover valve and drives the throttle to idle"]},{"cat":"Powerplant","msg":"In which modes is NP overspeed protection operational?","a":0,"opts":["Both automatic and manual modes","Automatic mode only","Manual mode only","Automatic mode, and manual mode only above 85% NP"]},{"cat":"Powerplant","msg":"In FADEC manual mode, which protection remains?","a":0,"opts":["NP overspeed protection is the ONLY remaining protected system","NP overspeed and TGT limiting remain","NP overspeed and torque limiting remain","All FADEC protections remain, but at reduced authority"]},{"cat":"Powerplant","msg":"What does selecting FADEC MANUAL do to the igniters?","a":0,"opts":["Energizes them to a continuous ON status to aid in preventing engine flameout","De-energizes them to prevent an inadvertent relight","Cycles them automatically whenever TGT drops below 149 °C","Has no effect on the igniters"]},{"cat":"Powerplant","msg":"To prevent uncontrollable rotor overspeed on the ground, when may you switch to manual mode?","a":0,"opts":["Only with the collective FULL DOWN and the throttle at IDLE","Only with the collective FULL DOWN and the throttle FULL OPEN","Only above 85% NP with the collective full down","Only with the throttle at the index mark and collective full down"]},{"cat":"Powerplant","msg":"Why must you NOT switch to manual mode while FADEC advisories are present?","a":0,"opts":["The control may not return to AUTO mode operation after the switch is returned to AUTO","The engine will immediately overspeed when the pistons engage","The igniters will not energize, risking a flameout","The HMU will default to minimum fuel flow, causing an underspeed"]},{"cat":"Powerplant","msg":"What controls the flat plate metering valve?","a":0,"opts":["Either the stepper motor (ECU) or the manual mode pistons (throttle)","Only the stepper motor (ECU)","Only the manual mode pistons (throttle)","The PLA potentiometer and the collective transducer"]},{"cat":"Powerplant","msg":"What holds the AUTO/MAN changeover valve closed?","a":0,"opts":["Electrical power — the solenoid is energized, forcing the valve closed against a spring","Spring pressure — the solenoid is de-energized in AUTO","Fuel pressure from the HMU pump","The mechanical linkage from the throttle"]},{"cat":"Powerplant","msg":"When electrical power is lost, what happens to the AUTO/MAN changeover valve?","a":0,"opts":["The solenoid de-energizes and the spring forces the valve open, allowing fuel to the manual mode pistons","The solenoid energizes and the valve closes, blocking fuel to the manual mode pistons","The valve remains in its last commanded position","The valve opens but the stepper motor continues to control fuel flow"]},{"cat":"Powerplant","msg":"In FADEC manual mode, how quickly does the follower piston move to the position dictated by the throttle?","a":0,"opts":["Within 2 seconds","Within 2.4 seconds","Within 4 seconds","Within 0.5 second"]},{"cat":"Powerplant","msg":"How long until the load piston contacts the metering lever?","a":0,"opts":["2.4 seconds for low power settings, up to 4 seconds for higher power settings","2 seconds for low power settings, up to 4 seconds for higher power settings","4 seconds for low power settings, up to 6 seconds for higher power settings","2.4 seconds regardless of power setting"]},{"cat":"Powerplant","msg":"If the throttle is not adjusted when the FADEC automatically reverts to manual mode, what happens?","a":0,"opts":["The load piston pushes the lever open, opening the fuel metering valve and causing an overspeed","The follower piston closes the metering valve, causing an underspeed and flameout","Fuel flow remains frozen at the last demanded rate","The NP overspeed system prevents any RPM change"]},{"cat":"Powerplant","msg":"What causes a FADEC fixed fuel flow condition?","a":0,"opts":["Lack of communication between the ECU and the stepper motor, freezing fuel flow at the rate at time of failure","Total loss of electrical power, opening the AUTO/MAN changeover valve","Failure of the AUTO/MAN solenoid valve within the HMU","Loss of the PMA above 85% NP"]},{"cat":"Powerplant","msg":"How is a FADEC fixed fuel flow failure indicated?","a":0,"opts":["FADEC FAIL audio and message, with the AUTO/MAN switch remaining in AUTO illumination","FADEC FAIL audio and message, with the AUTO/MAN switch illuminating MAN","FADEC MANUAL caution message only","FADEC DEGRADE advisory with no audio"]},{"cat":"Powerplant","msg":"With a fixed fuel flow failure, what happens if you fail to switch to manual mode?","a":0,"opts":["Main rotor RPM will droop or overspeed as collective is increased or decreased","The engine will flame out within 2.4 seconds","The NP overspeed system will trip and shut off fuel","Nothing — fuel flow is constant and RPM is stable"]},{"cat":"Powerplant","msg":"What causes a FADEC Direct Reversion To Manual (fail to manual)?","a":0,"opts":["Total loss of electrical power, a specific ECU internal connection failure, an open or short to the AUTO/MAN switch, or failure of the AUTO/MAN solenoid valve","Lack of communication between the ECU and the stepper motor","Dual NG or NP speed sensor failure only","Failure of the PLA potentiometer only"]},{"cat":"Powerplant","msg":"In a fail to manual, why does the HMU default to maximum fuel flow attainable?","a":0,"opts":["Because the throttle is in the full open position when the FADEC automatically switches to manual mode","Because the stepper motor is driven to its maximum position on failure","Because the follower piston fails to the full open stop","Because the NP overspeed solenoid commands maximum flow"]},{"cat":"Powerplant","msg":"How much time do you have to reduce the throttle to prevent an overspeed in a fail to manual?","a":0,"opts":["2.4 seconds","4 seconds","2 seconds","6 seconds"]},{"cat":"Powerplant","msg":"How is the anti-ice system fail safe?","a":0,"opts":["Power is required to keep the solenoid closed; a power loss opens the solenoid valve","Power is required to keep the solenoid open; a power loss closes the solenoid valve","The valve is spring-loaded closed and requires power to open","The valve is mechanically held in its last position on power loss"]},{"cat":"Powerplant","msg":"With the anti-ice switch ON, what is the state of the solenoid?","a":0,"opts":["Power is removed from the solenoid, deactivating it and allowing hot air to flow","Power is applied to the solenoid, activating it and allowing hot air to flow","Power is applied and the valve is held closed","The solenoid cycles automatically based on CIT"]},{"cat":"Powerplant","msg":"During the anti-ice operational check at 100% NP, what TGT rise is expected?","a":0,"opts":["A 15 to 20 degree rise","A 5 to 10 degree rise","A 25 to 30 degree rise","No rise; only the advisory appears"]},{"cat":"Powerplant","msg":"When is engine anti-ice used?","a":0,"opts":["Outside air temperature +5 °C or below with visible moisture","Outside air temperature +15 °C or below with visible moisture","Outside air temperature +5 °C or below, regardless of moisture","Any time icing is forecast, regardless of temperature"]},{"cat":"Powerplant","msg":"Above what altitude is engine instability or surge possible in manual mode?","a":0,"opts":["13,000 feet","10,000 feet","8,000 feet","15,000 feet"]},{"cat":"Powerplant","msg":"What are the indications of an engine overspeed?","a":0,"opts":["Right yaw, rapid increase in NR, NG, and NP, and an increase in engine and rotor noise","Left yaw, rapid increase in NR, NG, and NP, and an increase in engine and rotor noise","Right yaw, decrease in NR and NP, and a decrease in engine noise","Right yaw, increase in NP only, with NR and NG unchanged"]},{"cat":"Powerplant","msg":"If an engine overspeed reaches the trip point, what does the overspeed solenoid do?","a":0,"opts":["Reduces fuel flow to minimum until NP is reduced to the lower threshold, then NP oscillates between the two until pilot action is taken","Shuts off fuel flow completely until the pilot reduces the throttle","Reverts the FADEC to manual mode automatically","Limits NP to 107% and holds it there indefinitely"]},{"cat":"Powerplant","msg":"An advisory message differs from a caution message how?","a":0,"opts":["It is less critical — it advises of a condition or failure, with the option for action left to the crew's discretion, and gives a single bong","It is more critical — it requires immediate action and gives one bong per second","It is equal in priority to a caution, but appears in a separate block","It advises of a condition but is never accompanied by any audio tone"]},{"cat":"CDS","msg":"Where are the two IMCPUs located?","a":0,"opts":["The left IMCPU is directly behind the CPG seat; the right IMCPU is directly behind the pilot seat","The left IMCPU is directly behind the pilot seat; the right IMCPU is directly behind the CPG seat","Both are in the aft electrical compartment","Both are in the avionics compartment, left and right of the fuel cell"]},{"cat":"CDS","msg":"Which MFD does each IMCPU normally drive?","a":0,"opts":["The left IMCPU drives the CPG MFD; the right IMCPU drives the pilot MFD","The left IMCPU drives the pilot MFD; the right IMCPU drives the CPG MFD","Both IMCPUs drive both MFDs simultaneously","The left IMCPU drives both MFDs; the right IMCPU is a standby"]},{"cat":"CDS","msg":"Which systems does the RIGHT IMCPU control?","a":0,"opts":["Weapons and the Rotorcraft Mapping System","FADEC engine monitoring, air data systems, and PC DTS-V","Weapons and the air data systems","The Rotorcraft Mapping System and PC DTS-V"]},{"cat":"CDS","msg":"Which systems does the LEFT IMCPU control?","a":0,"opts":["FADEC engine monitoring, air data systems, and PC DTS-V","Weapons, the Rotorcraft Mapping System, and the radar altimeter","FADEC engine monitoring, weapons, and PC DTS-V","Air data systems and the radar altimeter"]},{"cat":"CDS","msg":"Which IMCPU is the bus controller, and what happens if it fails?","a":0,"opts":["The left IMCPU is bus controller; the right IMCPU assumes control if the left fails","The right IMCPU is bus controller; the left IMCPU assumes control if the right fails","Both share bus control; there is no single bus controller","The left IMCPU is bus controller; if it fails, the bus is lost"]},{"cat":"CDS","msg":"What are the two types of memory in the IMCPUs?","a":0,"opts":["Volatile (short-term, lost when power is removed) and non-volatile (long-term, unaffected by power loss)","Volatile (long-term, unaffected by power loss) and non-volatile (short-term, lost when power is removed)","RAM and ROM, both of which retain data when power is removed","Flash and cache, both of which are cleared at every coastdown"]},{"cat":"CDS","msg":"How many buttons surround the MFD bezel for mode selection?","a":0,"opts":["14","10","12","16"]},{"cat":"CDS","msg":"How many push buttons and toggle switches does the multifunction keyboard have?","a":0,"opts":["19 large push buttons, 28 small push buttons, and 3 toggle switches","28 large push buttons, 19 small push buttons, and 3 toggle switches","19 large push buttons, 28 small push buttons, and 2 toggle switches","19 large push buttons, 24 small push buttons, and 3 toggle switches"]},{"cat":"CDS","msg":"If one crew member has initiated data entry, when can the other crew member enter data?","a":0,"opts":["Not until that data entry has been validated with ENTER, or another bezel requiring no data entry is pressed","Immediately — both crew members can enter data simultaneously","Only after the originating crew member presses CLEAR","Not until the MFD mode is changed"]},{"cat":"CDS","msg":"How many communications radios does the RFD display, and on which lines?","a":0,"opts":["Five — line 1 FM, line 2 UHF, line 3 VHF, line 4 blank, line 5 FM2","Four — line 1 FM, line 2 UHF, line 3 VHF, line 4 FM2","Five — line 1 UHF, line 2 FM, line 3 VHF, line 4 blank, line 5 FM2","Five — line 1 FM, line 2 VHF, line 3 UHF, line 4 blank, line 5 FM2"]},{"cat":"CDS","msg":"If the RFD goes blank in flight, what should be done?","a":0,"opts":["Press the TEST switch momentarily to switch control to the other IMCPU; if the display returns, the problem is with the first IMCPU","Hold the TEST switch down through the entire test cycle; if the display returns, the problem is with the RFD","Cycle the MCPU circuit breaker to reset the display","Switch to the MFD COMM page; the RFD cannot be recovered in flight"]},{"cat":"CDS","msg":"What does the MISSION card store?","a":0,"opts":["Up to three sets of mission data, security classification and password, and notebook data","Up to ten sets of mission data, security classification and password, and notebook data","Mapping data used by the Rotorcraft Mapping System","Up to 10 separate flights' data"]},{"cat":"CDS","msg":"What is the capacity of the FLIGHT DATA card and the VIDEO DATA card?","a":0,"opts":["Flight data stores up to 10 separate flights; video provides 2 hours of high-resolution recording","Flight data stores up to 3 separate flights; video provides 2 hours of high-resolution recording","Flight data stores up to 10 separate flights; video provides 4 hours of high-resolution recording","Flight data stores up to 20 separate flights; video provides 1 hour of recording"]},{"cat":"CDS","msg":"What voltages does the CDS use?","a":0,"opts":["28 VDC and 115 VAC single phase","28 VDC and 115 VAC three phase","28 VDC and 26 VAC single phase","24 VDC and 115 VAC single phase"]},{"cat":"CDS","msg":"Which bus powers the CPG MFD, and what switch position is required?","a":0,"opts":["The 28 VDC power assured bus — requires ESNTL BUS in RUN","The battery/emergency bus — requires ESNTL BUS in START","The 28 VDC essential bus — requires ESNTL BUS in START","The 115 VAC bus — requires the AC generator on line"]},{"cat":"CDS","msg":"How many data buses connect the CDS to other systems, and what standard do they use?","a":0,"opts":["Two — MIL-STD-1553B","One — MIL-STD-1553B","Two — ARINC-429","Four — MIL-STD-1553B"]},{"cat":"CDS","msg":"How is data transmitted on bus lines A and B?","a":0,"opts":["Identical data is transmitted simultaneously on both lines; if one bus fails, the other handles all traffic","Line A carries commands and line B carries responses; if one fails, the bus is lost","Data alternates between lines A and B to balance the load","Line B is a cold standby that activates only if line A fails"]},{"cat":"CDS","msg":"How many total warning messages are there, and how many are displayed in the warning box?","a":0,"opts":["Eleven total; nine are displayed in the warning box, with a maximum of five at a time","Nine total; all nine are displayed in the warning box, with a maximum of five at a time","Eleven total; all eleven are displayed in the warning box, with a maximum of three at a time","Eleven total; nine are displayed in the warning box, with a maximum of three at a time"]},{"cat":"CDS","msg":"Under what conditions is the CHECK THROTTLE warning displayed in a box in the center of the MFD?","a":0,"opts":["When throttle position is less than 92% and radar altitude is less than 400 feet","When throttle position is less than 92% and radar altitude is less than 200 feet","When throttle position is less than 95% and radar altitude is less than 400 feet","When throttle position is less than 92%, regardless of altitude"]},{"cat":"CDS","msg":"How is the LOW ALTITUDE warning indicated?","a":0,"opts":["It is not displayed in the warning box — only by a warning tone and the LO designation on the VSD page","It is displayed in the warning box along with a warning tone","It is displayed as a caution message with one bong per second","It is displayed in a box in the center of the MFD"]},{"cat":"CDS","msg":"How many prioritized messages does each caution/advisory block hold?","a":0,"opts":["Up to three","Up to five","Up to two","Up to four"]},{"cat":"CDS","msg":"How do caution and advisory messages rank on the display list?","a":0,"opts":["Caution messages have priority over advisory messages and precede them","Advisory messages have priority over caution messages and precede them","They are displayed in the order they occurred, regardless of type","They are displayed alphabetically within a single block"]},{"cat":"CDS","msg":"Which advisory is displayed in the upper left corner of the MFD with no bong when engaged?","a":0,"opts":["HHM (heading hold)","HVR DEGRADED","ONE YAW CHAN OFF","EXT PWR"]},{"cat":"CDS","msg":"What does the first press of the ACK switch do?","a":0,"opts":["Removes the caution box in the top left corner and terminates the audio","Causes warning messages to disappear and scrolls the caution/advisory block","Scrolls through and removes additional caution/advisory messages","Recalls all previously acknowledged messages"]},{"cat":"CDS","msg":"Can the warning box be eliminated with the ACK switch in flight?","a":0,"opts":["No — the audio ends and the box is temporarily removed only while the switch is held in ACK","Yes — one press permanently removes the warning box","Yes — two presses permanently remove the warning box","No — the ACK switch has no effect on warnings, only on cautions"]},{"cat":"CDS","msg":"What are the three audio rates?","a":0,"opts":["Warning — three bongs per second; Caution — one bong per second; selected Advisories — one bong","Warning — one bong per second; Caution — three bongs per second; selected Advisories — one bong","Warning — three bongs per second; Caution — one bong; selected Advisories — one bong per second","Warning — continuous tone; Caution — three bongs per second; selected Advisories — one bong"]},{"cat":"CDS","msg":"What do the vertical scale display colors indicate?","a":0,"opts":["Blue — power applied; green — normal operating range; yellow — caution range; red — minimum and maximum limits","Blue — instrument failure; green — normal operating range; yellow — caution range; red — minimum and maximum limits","Blue — power applied; green — normal; yellow — transient range; red — precautionary range","Blue — standby; green — normal; yellow — maximum limits; red — exceedance recorded"]},{"cat":"CDS","msg":"On the Power Assurance page, when are the current factor variables frozen?","a":0,"opts":["For 30 seconds after PERFORM is pressed, or until the page is exited","For 60 seconds after PERFORM is pressed, or until the page is exited","For 30 seconds after the page is entered","Until another PAC check is performed, with no time limit"]},{"cat":"CDS","msg":"What is the default fuel check interval, and what are the selections?","a":0,"opts":["30 minutes default; selections are 20, 30, or 60 minutes","20 minutes default; selections are 20, 30, or 60 minutes","30 minutes default; selections are 15, 30, or 45 minutes","60 minutes default; selections are 20, 30, or 60 minutes"]},{"cat":"CDS","msg":"What does the C/W History page display, and where is the count stored?","a":0,"opts":["Only non-zero cautions and warnings with occurrence counts; stored in RAM during flight and in NVM during coast-down","All cautions and warnings including zero counts; stored in NVM continuously","Only non-zero cautions and warnings; stored in volatile memory only and lost at shutdown","Only warnings, not cautions; stored in RAM during flight"]},{"cat":"CDS","msg":"At what count is the C/W History counter inhibited from further incrementing?","a":0,"opts":["255","999","100","25"]},{"cat":"CDS","msg":"Are caution/warning events occurring on the ground recorded in the C/W History?","a":0,"opts":["No — events occurring on the ground are not recorded","Yes — all events are recorded regardless of WOG status","Only warnings are recorded on the ground; cautions are not","Only if the aircraft has previously exceeded 55% NG"]},{"cat":"CDS","msg":"In HVR mode, what happens if the EGI is not valid?","a":0,"opts":["The Velocity Vector and Acceleration Cue are not displayed","The Hover Aircraft Symbol is not displayed","The entire HVR page is blanked","The Position box is not displayed, but the Velocity Vector remains"]},{"cat":"CDS","msg":"How is the Hover Bob-Up mode selected, and what does a short press do?","a":0,"opts":["Press the switch for 1 second or longer to select or deselect; a press of less than 1 second drops a target location to the Target List","Press the switch for less than 1 second to select or deselect; a press of 1 second or longer drops a target location to the Target List","Press the switch twice within 15 seconds to select; a single press drops a target","Select it from the MFD mode key; the c
